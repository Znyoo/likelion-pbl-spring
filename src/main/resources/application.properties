spring.application.name=likelion-pbl-spring

# ================= [ MySQL 연결 설정 ] =================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 로컬 컴퓨터에 만든 likelion_pbl 창고 주소입니다.
spring.datasource.url=jdbc:mysql://localhost:3306/likelion_pbl?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root

# ⚠️ [매우 중요] 아래 '본인비밀번호' 자리에 아까 MySQL 설치할 때 타이핑했던 비밀번호를 직접 적어주세요!
# (예를 들어 비밀번호가 1234였으면 spring.datasource.password=1234 라고 적으시면 됩니다.)
spring.datasource.password=wlsgy852!

# ================= [ JPA / Hibernate 기능 설정 ] =================
# ddl-auto=create: 서버를 켤 때마다 테이블을 매번 깨끗하게 새로 리셋하고 만들어주는 편리한 기능입니다.
spring.jpa.hibernate.ddl-auto=create
# 스프링이 백엔드에서 날리는 데이터베이스 명령어(SQL)를 인텔리제이 콘솔창에 그대로 보여줍니다.
spring.jpa.show-sql=true
# 콘솔창에 출력되는 SQL 명령어를 보기 좋게 줄바꿈해서 정렬해 줍니다.
spring.jpa.properties.hibernate.format_sql=true